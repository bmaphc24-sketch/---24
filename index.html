<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงนามถวายพระพรออนไลน์</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>ลงนามถวายพระพรออนไลน์</h1>
      <p>
        ขอเชิญชวนประชาชนและบุคลากรร่วมลงนามถวายพระพรชัยมงคล พระบาทสมเด็จพระเจ้าอยู่หัว  
        เนื่องในโอกาสวันเฉลิมพระชนมพรรษา วันที่ ๒๘ กรกฎาคม ๒๕๖๙  
      </p>
    </header>

    <!-- ภาพพระบาทสมเด็จพระเจ้าอยู่หัว -->
    <div class="royal-image">
      <img src="king.jpg.jpg" alt="พระบาทสมเด็จพระเจ้าอยู่หัว">
    </div>

    <p class="org">
      ศูนย์บริการสาธารณสุข 24 บางเขน  สำนักอนามัย
    </p>

    <form>
      <label><input type="radio" name="wish" value="1"> ขอพระองค์ทรงพระเจริญ ด้วยเกล้าด้วยกระหม่อม ขอเดชะ</label><br>
      <label><input type="radio" name="wish" value="2"> ขอพระองค์ทรงพระเจริญยิ่งยืนนาน ด้วยเกล้าด้วยกระหม่อม ขอเดชะ</label><br>
      <label><input type="radio" name="wish" value="3"> ขอพระราชทานถวายพระพรชัยมงคล ขอพระองค์ทรงพระเจริญ ด้วยเกล้าด้วยกระหม่อม ขอเดชะ</label><br><br>

      <label>ชื่อ – นามสกุล *<br><input type="text" name="fullname" required></label><br><br>
      <label>ตำแหน่ง (ถ้ามี)<br><input type="text" name="position"></label><br><br>
      <label>หน่วยงาน (ถ้ามี)<br><input type="text" name="organization"></label><br><br>

      <button type="submit">ลงนามถวายพระพร</button>
    </form>

    <footer>
      <p>© ๒๕๖๙ ศูนย์บริการสาธารณสุข 24 บางเขน สำนักอนามัย กรุงเทพมหานคร</p>
    </footer>
  </div>
</body>
</html>
